<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Table | Tibok Café</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { charcoal: '#121212', pandaPink: '#D70F64' },
                    fontFamily: { outfit: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-charcoal text-white font-outfit">

    <!-- Sticky Navigation -->
    <nav class="sticky top-0 z-50 bg-charcoal/90 backdrop-blur-md border-b border-white/10 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold tracking-tighter uppercase italic">Tibok <span class="text-pandaPink">Café</span></a>
            <div class="hidden md:flex space-x-8 font-medium uppercase text-sm tracking-widest">
                <a href="index.html" class="hover:text-pandaPink transition">Home</a>
                <a href="menu.html" class="hover:text-pandaPink transition">Menu</a>
                <a href="booking.html" class="text-pandaPink">Booking</a>
            </div>
            <a href="tel:09999859489" class="bg-white text-black px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest hover:bg-pandaPink hover:text-white transition">Call Now</a>
        </div>
    </nav>

    <main class="py-24 px-6 max-w-4xl mx-auto">
        <div class="bg-white/5 p-8 md:p-16 border border-white/10">
            <div class="mb-12">
                <h1 class="text-4xl font-bold uppercase tracking-tighter mb-2">Reserve Your <span class="text-pandaPink">Spot</span></h1>
                <p class="text-gray-400">Join us at 60 Naval, Taytay. We accept bookings for study groups, meetings, or quiet dates.</p>
            </div>

            <form action="#" class="space-y-8">
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="flex flex-col">
                        <label class="text-xs uppercase tracking-widest font-bold mb-2 text-gray-500">Full Name</label>
                        <input type="text" class="bg-transparent border-b border-white/20 py-3 focus:outline-none focus:border-pandaPink transition" placeholder="Enter name">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-xs uppercase tracking-widest font-bold mb-2 text-gray-500">Phone Number</label>
                        <input type="tel" class="bg-transparent border-b border-white/20 py-3 focus:outline-none focus:border-pandaPink transition" placeholder="09XX XXX XXXX">
                    </div>
                </div>

                <div class="grid md:grid-cols-3 gap-8">
                    <div class="flex flex-col">
                        <label class="text-xs uppercase tracking-widest font-bold mb-2 text-gray-500">Date</label>
                        <input type="date" class="bg-transparent border-b border-white/20 py-3 focus:outline-none focus:border-pandaPink transition text-gray-400">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-xs uppercase tracking-widest font-bold mb-2 text-gray-500">Time</label>
                        <select class="bg-charcoal border-b border-white/20 py-3 focus:outline-none focus:border-pandaPink transition text-gray-400">
                            <option>12:00 PM</option>
                            <option>02:00 PM</option>
                            <option>04:00 PM</option>
                            <option>06:00 PM</option>
                            <option>08:00 PM</option>
                            <option>10:00 PM</option>
                        </select>
                    </div>
                    <div class="flex flex-col">
                        <label class="text-xs uppercase tracking-widest font-bold mb-2 text-gray-500">Guests</label>
                        <input type="number" class="bg-transparent border-b border-white/20 py-3 focus:outline-none focus:border-pandaPink transition" placeholder="1-10">
                    </div>
                </div>

                <div class="flex flex-col">
                    <label class="text-xs uppercase tracking-widest font-bold mb-2 text-gray-500">Notes (Optional)</label>
                    <textarea rows="3" class="bg-transparent border border-white/20 p-4 focus:outline-none focus:border-pandaPink transition" placeholder="Special requests or occasion?"></textarea>
                </div>

                <button type="submit" class="w-full bg-pandaPink py-5 font-bold uppercase tracking-[0.2em] hover:brightness-110 transition">Request Table</button>
            </form>

            <div class="mt-16 pt-8 border-t border-white/10 flex flex-col md:flex-row gap-8 justify-between text-sm text-gray-500">
                <div class="flex items-center gap-3">
                    <svg class="w-5 h-5 text-pandaPink" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    0999 985 9489
                </div>
                <div class="flex items-center gap-3">
                    <svg class="w-5 h-5 text-pandaPink" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    Open 12:00 PM – 12:00 AM
                </div>
            </div>
        </div>
    </main>

    <footer class="py-12 px-6 text-center opacity-40 text-xs tracking-widest uppercase">
        Tibok Café Taytay — Industrial Aesthetic
    </footer>

</body>
</html>
